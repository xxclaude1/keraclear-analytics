[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# API redirects (must come before SPA catch-all)
[[redirects]]
  from = "/api/analytics"
  to = "/.netlify/functions/api-analytics"
  status = 200

[[redirects]]
  from = "/api/sessions"
  to = "/.netlify/functions/api-sessions"
  status = 200

[[redirects]]
  from = "/api/visitors"
  to = "/.netlify/functions/api-visitors"
  status = 200

[[redirects]]
  from = "/api/economics"
  to = "/.netlify/functions/api-economics"
  status = 200

# SPA routing — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for the tracking snippet (CORS)
[[headers]]
  for = "/snippet/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=300"

# Headers for function endpoints (CORS)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
